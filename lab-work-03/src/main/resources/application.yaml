spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dairystore
    username: dairy_user
    password: dairy_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  thymeleaf:
    cache: false
server:
  port: 8083