spring:
  application:
    name: dairy
  datasource:
    url: jdbc:postgresql://localhost:5432/dairy
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  thymeleaf:
    cache: false

server:
  port: 8080