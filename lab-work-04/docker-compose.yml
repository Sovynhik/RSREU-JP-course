version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: dairy_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: dairy_user
      MONGO_INITDB_ROOT_PASSWORD: dairy_pass
      MONGO_INITDB_DATABASE: dairystore
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data: